name: finance_ds_gallery
description: Gallery app demonstrating the Finance Design System components.
version: 1.0.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  design_tokens:
    path: ../design_tokens
  cupertino_components:
    path: ../cupertino_components
  finance_components:
    path: ../finance_components
  app_foundation:
    path: ../app_foundation

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/images/
